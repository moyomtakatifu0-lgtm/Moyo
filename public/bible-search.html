<input id="q" placeholder="Tafuta...">
<button onclick="search()">Search</button>

<div id="results"></div>

<script type="module">

import { searchBible }
from "./app/modules/books/searchService.js";

window.search = async () => {

  const q = document.getElementById("q").value;

  const results = await searchBible(q);

  const box = document.getElementById("results");

  box.innerHTML = "";

  results.forEach(r => {

    box.innerHTML += `
      <div style="padding:10px;border-bottom:1px solid #eee">
        <b>${r.book} ${r.chapter}:${r.verse}</b><br>
        ${r.text}
      </div>
    `;

  });

};

</script>
