<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moyo App - Kanuni</title>

<link rel="stylesheet" href="../app/assets/css/global.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
  padding-bottom:80px;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  background:#2e7d32;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

/* CONTENT */
.content{
  position:absolute;
  top:55px;
  bottom:80px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* CARD */
.card{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  cursor:pointer;
  width:100%;
  max-width:320px;
  transition:0.2s;
  color:#2e7d32;
  font-weight:bold;
}

.card:hover{
  transform:scale(1.03);
}

.icon{
  font-size:40px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="topbar">
  📘 Kanuni za Moyo App
</div>

<div class="content">

  <div class="card" onclick="openRules()">
    <div class="icon">📘</div>
    <div>Fungua Kanuni</div>
  </div>

</div>

<div id="globalBottomNav"></div>

<script type="module">

import { go as routerGo } from "../app/core/router.js";
import { loadBottomNav } from "../app/components/bottomNav.js";

window.go = routerGo;

function safeGo(path){
  if (!routerGo) return;
  routerGo(path);
}

window.openRules = ()=>{
  safeGo("book-reader.html?type=rules");
};

const nav = document.getElementById("globalBottomNav");
if (nav) {
  nav.innerHTML = loadBottomNav("rules");
}

</script>

</body>
</html>
