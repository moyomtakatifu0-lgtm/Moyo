<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Novena Reader</title>

<link rel="stylesheet" href="../app/assets/css/global.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#2e7d32;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.content{
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  line-height:1.6;
  white-space:pre-line;
}

</style>

</head>

<body>

<div class="topbar" id="title">Novena</div>

<div class="content">
  <div class="card" id="content">Loading...</div>
</div>

<div id="globalBottomNav"></div>

<script type="module">

import { loadBottomNav } from "../app/components/bottomNav.js";
import { go as routerGo } from "../app/core/router.js";

window.go = routerGo;

/* NOVENA DATA */
const novenas = {
  "holy-spirit": {
    title: "Roho Mtakatifu Novena",
    content: `Siku ya 1: Omba Roho Mtakatifu akuongoze...
Siku ya 2: Omba hekima...
Siku ya 3: Omba nguvu...`
  },

  "divine-mercy": {
    title: "Divine Mercy Novena",
    content: `Baba wa milele, nakutolea Mwili na Damu...
Rehema yako na iangaze dunia...`
  },

  "sacred-heart": {
    title: "Moyo Mtakatifu Novena",
    content: `Ee Yesu mwenye Moyo Mtakatifu...
Tunakusifu na kukuabudu...`
  }
};

const params = new URLSearchParams(location.search);
const id = params.get("id");

const data = novenas[id] || null;

const titleEl = document.getElementById("title");
const contentEl = document.getElementById("content");

if(data){
  titleEl.innerText = data.title;
  contentEl.innerText = data.content;
}else{
  titleEl.innerText = "Novena";
  contentEl.innerText = "Novena haijapatikana.";
}

document.getElementById("globalBottomNav").innerHTML =
  loadBottomNav("menu");

</script>

</body>
</html>
