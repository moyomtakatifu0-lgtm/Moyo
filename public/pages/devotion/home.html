<!--
PROJECT: Moyo App
MODULE: Devotion Shell (MAIN APP)
ROLE: User Landing + Global Navigation Host
-->

<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Moyo App</title>

<link rel="stylesheet" href="../../assets/css/global.css"/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.topbar{
  background:#2e7d32;
  color:#fff;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
}

.navbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  border-top:1px solid #ddd;
}

.navbar button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  font-size:12px;
}
</style>
</head>

<body>

<div class="topbar">✝️ Moyo App</div>

<div class="container" id="appView">
  Loading...
</div>

<div class="navbar">
  <button onclick="loadFeed()">Feed</button>
  <button onclick="loadDevotion()">Devotion</button>
  <button onclick="loadProfile()">Profile</button>
  <button onclick="loadSettings()">Settings</button>
</div>

<script type="module">

import { auth } from "../../app/core/firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

import { go } from "../../app/core/router.js";

window.go = go;

/* =========================
   AUTH GUARD (SHELL LEVEL)
========================= */
onAuthStateChanged(auth, (user) => {

  if (!user) {
    go("login.html");
  }
});

/* =========================
   VIEW ENGINE (SIMPLE SHELL)
========================= */

function setView(html){
  document.getElementById("appView").innerHTML = html;
}

/* FEED */
window.loadFeed = () => {
  setView("<h3>📢 Feed</h3><p>Latest posts appear here...</p>");
};

/* DEVOTION */
window.loadDevotion = () => {
  setView("<h3>✝️ Devotion</h3><p>Daily devotion content...</p>");
};

/* PROFILE */
window.loadProfile = () => {
  setView("<h3>👤 Profile</h3><p>User profile info...</p>");
};

/* SETTINGS */
window.loadSettings = () => {
  setView("<h3>⚙️ Settings</h3><p>App customization options...</p>");
};

/* DEFAULT LOAD */
loadDevotion();

</script>

</body>
</html>
