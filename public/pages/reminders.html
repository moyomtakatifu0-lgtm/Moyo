<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kumbusho za Jimbo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.topbar{
  background:#2e7d32;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

.tabs{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.tab{
  flex:1;
  padding:8px;
  text-align:center;
  background:#ddd;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

.tab.active{
  background:#2e7d32;
  color:#fff;
}

.card{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.date{
  font-size:13px;
  color:#2e7d32;
  font-weight:bold;
}

.today{
  border-left:5px solid orange;
}

.search{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="topbar">📅 Kumbusho za Jimbo</div>

<div class="container">

<input class="search" id="search" placeholder="🔎 Tafuta...">

<div class="tabs">
  <div class="tab active" onclick="setView('list')">List</div>
  <div class="tab" onclick="setView('week')">Week</div>
  <div class="tab" onclick="setView('month')">Month</div>
</div>

<div id="view"></div>

</div>

<script type="module">

import { auth, db } from "../app/core/firebase.js";
import {
  collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

let events = [];
let currentView = "list";

/* =========================
   AUTH + LOAD
========================= */
onAuthStateChanged(auth, async (user)=>{

  if(!user){
    location.href="/pages/login.html";
    return;
  }

  const profile = await getProfile(user.uid);
  const dioceseId = profile?.dioceseId;

  const snap = await getDocs(query(
    collection(db,"reminders"),
    where("dioceseId","==",dioceseId),
    where("active","==",true)
  ));

  events = [];
  snap.forEach(d=>events.push(d.data()));

  render();
});

/* =========================
   PROFILE FETCH (simple)
========================= */
async function getProfile(uid){
  const snap = await getDocs(collection(db,"users"));
  let data=null;
  snap.forEach(d=>{
    if(d.id===uid) data=d.data();
  });
  return data;
}

/* =========================
   VIEW SWITCH
========================= */
window.setView = (v)=>{
  currentView = v;
  render();
};

/* =========================
   RENDER
========================= */
function render(){

  if(currentView==="list") return renderList();
  if(currentView==="week") return renderWeek();
  if(currentView==="month") return renderMonth();
}

/* =========================
   LIST VIEW
========================= */
function renderList(){

  const el = document.getElementById("view");

  const sorted = [...events].sort((a,b)=>
    new Date(a.date)-new Date(b.date)
  );

  el.innerHTML = sorted.map(e=>{

    const isToday = isSameDay(e.date);

    return `
      <div class="card ${isToday?'today':''}">
        <div class="date">📅 ${format(e.date)}</div>
        <div>${e.title}</div>
      </div>
    `;
  }).join("");
}

/* =========================
   WEEK VIEW
========================= */
function renderWeek(){

  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate()-now.getDay());

  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate()+6);

  const filtered = events.filter(e=>{
    const d = new Date(e.date);
    return d>=weekStart && d<=weekEnd;
  });

  document.getElementById("view").innerHTML =
    filtered.length? filtered.map(e=>`
      <div class="card">
        <div class="date">${format(e.date)}</div>
        <div>${e.title}</div>
      </div>
    `).join("")
    : "<div class='card'>Hakuna matukio wiki hii</div>";
}

/* =========================
   MONTH VIEW
========================= */
function renderMonth(){

  const now = new Date();
  const m = now.getMonth();
  const y = now.getFullYear();

  const filtered = events.filter(e=>{
    const d = new Date(e.date);
    return d.getMonth()===m && d.getFullYear()===y;
  });

  document.getElementById("view").innerHTML =
    filtered.length? filtered.map(e=>`
      <div class="card">
        <div class="date">${format(e.date)}</div>
        <div>${e.title}</div>
      </div>
    `).join("")
    : "<div class='card'>Hakuna matukio mwezi huu</div>";
}

/* =========================
   HELPERS
========================= */
function format(d){
  return new Date(d).toLocaleDateString("sw-TZ");
}

function isSameDay(date){
  return new Date(date).toDateString() === new Date().toDateString();
}

/* =========================
   🔎 SEARCH
========================= */
document.getElementById("search").addEventListener("input",(e)=>{

  const val = e.target.value.toLowerCase();

  const filtered = events.filter(ev=>
    ev.title.toLowerCase().includes(val)
  );

  document.getElementById("view").innerHTML =
    filtered.map(e=>`
      <div class="card">
        <div class="date">${format(e.date)}</div>
        <div>${e.title}</div>
      </div>
    `).join("");
});

</script>

</body>
</html>
