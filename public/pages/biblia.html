<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moyo App - Biblia</title>

<link rel="stylesheet" href="../assets/css/global.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  background:#2e7d32;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

.content{
  position:absolute;
  top:55px;
  bottom:80px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  cursor:pointer;
  width:100%;
  max-width:320px;
  transition:0.2s;
  color:#2e7d32;
  font-weight:bold;
}

.card:active{
  transform:scale(0.98);
}

.icon{
  font-size:40px;
  margin-bottom:10px;
}

</style>

</head>

<body>

<div class="topbar">
  📖 Biblia Takatifu
</div>

<div class="content">

  <div class="card" onclick="openBible()">
    <div class="icon">📖</div>
    <div>Fungua Biblia</div>
  </div>

</div>

<div id="globalBottomNav"></div>

<script type="module">

import { loadBottomNav } from "../app/components/bottomNav.js";
import { go } from "../app/core/router.js";
import { protectPage } from "../app/core/accessEngine.js";

window.go = go;

await protectPage(["admin","editor","writer","user"]);

window.openBible = ()=>{
  go("book-reader.html?type=bible");
};

document.getElementById("globalBottomNav").innerHTML =
  loadBottomNav("home");

</script>

</body>
</html>
