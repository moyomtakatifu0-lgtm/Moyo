<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moyo App - Rozari</title>

<link rel="stylesheet" href="../app/assets/css/global.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
  padding-bottom:80px;
}

.topbar{
  position:sticky;
  top:0;
  background:#2e7d32;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:white;
  padding:18px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
}

.title{
  font-weight:bold;
  color:#2e7d32;
  margin-bottom:6px;
}

.desc{
  font-size:13px;
  color:#666;
}

</style>

</head>

<body>

<div class="topbar">
  📿 Rozari Takatifu
</div>

<div class="container">

  <div class="card" onclick="openRosary('holy')">
    <div class="title">Rozari Takatifu</div>
    <div class="desc">Rozari ya kawaida ya Bikira Maria</div>
  </div>

  <div class="card" onclick="openRosary('mercy')">
    <div class="title">Rozari ya Huruma ya Mungu</div>
    <div class="desc">Rozari ya Divine Mercy</div>
  </div>

  <div class="card" onclick="openRosary('sacred')">
    <div class="title">Rozari ya Moyo Mtakatifu</div>
    <div class="desc">Rozari ya Yesu Moyo Mtakatifu</div>
  </div>

</div>

<div id="globalBottomNav"></div>

<script type="module">

import { go as routerGo } from "../app/core/router.js";
import { loadBottomNav } from "../app/components/bottomNav.js";

window.go = routerGo;

window.openRosary = (type)=>{

  const allowed = ["holy","mercy","sacred"];

  if (!allowed.includes(type)) return;

  routerGo("rosary-reader.html?type=" + type);
};

document.getElementById("globalBottomNav")
.innerHTML = loadBottomNav("menu");

</script>

</body>
</html>
