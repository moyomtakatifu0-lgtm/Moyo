<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Historia - Moyo App</title>

<link rel="stylesheet" href="../app/assets/css/global.css">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  background:#2e7d32;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  z-index:1000;
}

.content{
  margin-top:70px;
  padding:15px;
  padding-bottom:90px;
}

.card{
  background:white;
  padding:18px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  transition:0.2s;
}

.card:hover{
  transform:scale(1.02);
}

h3{
  color:#2e7d32;
  margin-top:0;
}

p{
  color:#555;
  line-height:1.6;
}

#globalBottomNav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:999;
}

</style>

</head>

<body>

<div class="topbar">📖 Historia</div>

<div class="content">

  <div class="card">
    <h3>Historia ya Moyo Mtakatifu</h3>
    <p>
      Asili ya ibada ya Moyo Mtakatifu wa Yesu ilianza kama ishara ya upendo wa Kristo kwa binadamu wote.
      Ibada hii inasisitiza huruma, upendo na sadaka ya Yesu kwa ulimwengu.
    </p>
  </div>

</div>

<div id="globalBottomNav"></div>

<script type="module">

import { go } from "../app/core/router.js";
import { loadBottomNav } from "../app/components/bottomNav.js";

window.go = go;

document.getElementById("globalBottomNav").innerHTML =
  loadBottomNav("menu");

</script>

</body>
</html>
