<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<link rel="stylesheet" href="../assets/css/global.css">

<style>

body{
  font-family:Arial;
  background:#f4f6f8;
  margin:0;
  padding-bottom:80px;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

h2{
  color:#2e7d32;
  text-align:center;
}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.loading{
  color:gray;
  text-align:center;
}

button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  margin-top:6px;
}

button:disabled{
  opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

  <h2>Admin Panel</h2>

  <div id="users" class="loading">Loading users...</div>

</div>

<div id="globalBottomNav"></div>

<script type="module">

/* =========================
   ROUTING STANDARD IMPORT (ADDED ONLY FOR CONSISTENCY)
========================= */
import { go } from "../app/core/router.js";

/* =========================
   ACCESS ENGINE
========================= */
import { protectPage } from "../app/core/accessEngine.js";

/* =========================
   CORE IMPORTS
========================= */
import { db } from "../app/core/firebase.js";
import { loadBottomNav } from "../app/components/bottomNav.js";

import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* =========================
   SECURITY
========================= */
await protectPage(["admin"]);

/* ROUTER BIND (STANDARD) */
window.go = go;

/* LOAD USERS */
async function loadUsers(){

  try{

    const snap = await getDocs(collection(db,"users"));

    const html = snap.docs.map(d => {

      const data = d.data();

      return `
        <div class="card">
          <b>${data.email || "No email"}</b><br>
          Role: ${data.role || "user"}
        </div>
      `;

    }).join("");

    document.getElementById("users").innerHTML =
      html || "<div class='loading'>No users found</div>";

  } catch(e){
    document.getElementById("users").innerHTML =
      `<div class="loading">${e.message}</div>`;
  }

}

loadUsers();

/* NAVIGATION (DASHBOARD SYSTEM) */
document.getElementById("globalBottomNav").innerHTML =
  loadBottomNav("admin");

</script>

</body>
</html>
