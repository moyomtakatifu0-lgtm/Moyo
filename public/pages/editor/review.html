<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor Review Panel</title>

<link rel="stylesheet" href="/app/assets/css/global.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.topbar{
  background:#6a1b9a;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

.post{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.title{
  font-weight:bold;
  font-size:16px;
  margin-bottom:5px;
}

.small{
  font-size:12px;
  color:#777;
  margin-bottom:10px;
}

textarea{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  margin-top:6px;
  font-size:14px;
}

.btns{
  display:flex;
  gap:8px;
  margin-top:10px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.approve{
  background:#2e7d32;
  color:#fff;
}

.reject{
  background:#c62828;
  color:#fff;
}

.save{
  background:#1565c0;
  color:#fff;
}
</style>
</head>

<body>

<div class="topbar">✏️ Editor Review Panel</div>

<div class="container" id="postsContainer">
Loading posts...
</div>

<script type="module">

import { protectPage } from "../../app/core/authGuard.js";
import { db } from "../../app/core/firebase.js";

import {
  collection,
  query,
  where,
  getDocs,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* ACCESS */
await protectPage(["editor","admin"]);

/* LOAD ONLY SUBMITTED POSTS */
async function loadPosts(){

  const q = query(
    collection(db,"posts"),
    where("status","==","submitted")
  );

  const snap = await getDocs(q);

  const container = document.getElementById("postsContainer");

  container.innerHTML = "";

  if(snap.empty){
    container.innerHTML = "Hakuna posts za review.";
    return;
  }

  snap.forEach(docSnap => {

    const p = docSnap.data();
    const id = docSnap.id;

    container.innerHTML += `
      <div class="post">

        <div class="title">${p.title}</div>

        <div class="small">
          By: ${p.createdBy || "unknown"}
        </div>

        <div>
          <b>Content</b>
          <textarea id="content-${id}">${p.content || ""}</textarea>
        </div>

        <div>
          <b>Tafakari</b>
          <textarea id="tafakari-${id}">${p.tafakari || ""}</textarea>
        </div>

        <div>
          <b>Sala</b>
          <textarea id="sala-${id}">${p.sala || ""}</textarea>
        </div>

        <div class="btns">

          <button class="save" onclick="saveEdit('${id}')">
            Save Edit
          </button>

          <button class="approve" onclick="approve('${id}')">
            Approve
          </button>

          <button class="reject" onclick="reject('${id}')">
            Reject
          </button>

        </div>

      </div>
    `;
  });
}

/* SAVE EDIT (UPDATES SAME DOCUMENT) */
window.saveEdit = async (id) => {

  await updateDoc(doc(db,"posts",id),{

    content: document.getElementById(`content-${id}`).value,
    tafakari: document.getElementById(`tafakari-${id}`).value,
    sala: document.getElementById(`sala-${id}`).value,

    updatedAt: serverTimestamp()
  });

  alert("Saved ✔");
};

/* APPROVE → MOVE TO ADMIN */
window.approve = async (id) => {

  await updateDoc(doc(db,"posts",id),{
    status: "approved",
    updatedAt: serverTimestamp()
  });

  alert("Approved ✔");
  loadPosts();
};

/* REJECT → BACK TO DRAFT */
window.reject = async (id) => {

  await updateDoc(doc(db,"posts",id),{
    status: "draft",
    updatedAt: serverTimestamp()
  });

  alert("Rejected ❌");
  loadPosts();
};

loadPosts();

</script>

</body>
</html>
