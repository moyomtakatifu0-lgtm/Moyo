<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Writer - Create Post (Offline)</title>

<link rel="stylesheet" href="/app/assets/css/global.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.topbar{
  background:#2e7d32;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
  max-width:700px;
  margin:auto;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

textarea{
  resize:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.save{
  background:#1565c0;
  color:white;
}

.submit{
  background:#2e7d32;
  color:white;
}

.statusBox{
  margin-bottom:10px;
  font-size:13px;
  color:#555;
}
</style>
</head>

<body>

<div class="topbar">✍️ Writer Dashboard (Offline Enabled)</div>

<div class="container">

  <div class="card">

    <div class="statusBox" id="statusBox">Status: Ready</div>

    <input id="title" placeholder="Title">

    <textarea id="content" rows="6" placeholder="Content..."></textarea>

    <textarea id="tafakari" rows="4" placeholder="Tafakari..."></textarea>

    <textarea id="sala" rows="4" placeholder="Sala..."></textarea>

    <button class="save" id="saveDraftBtn">Save Draft (Offline)</button>
    <button class="submit" id="submitBtn">Submit for Review</button>

  </div>

</div>

<script type="module">

import { protectPage } from "../../app/core/authGuard.js";
import { db, auth } from "../../app/core/firebase.js";

import {
  addDoc,
  collection,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* =========================
   ACCESS
========================= */
await protectPage(["writer"]);

/* =========================
   OFFLINE DB (IndexedDB)
========================= */
const DB_NAME = "moyo_writer_db";
const STORE = "drafts";

function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, 1);

    req.onupgradeneeded = () => {
      const db = req.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE, { keyPath: "id", autoIncrement:true });
      }
    };

    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveOffline(data){

  const db = await openDB();
  const tx = db.transaction(STORE, "readwrite");
  const store = tx.objectStore(STORE);

  store.add({
    ...data,
    status: "draft",
    sync: "pending",
    createdAt: Date.now()
  });
}

/* =========================
   FORM DATA
========================= */
function getData(){
  return {
    title: document.getElementById("title").value.trim(),
    content: document.getElementById("content").value.trim(),
    tafakari: document.getElementById("tafakari").value.trim(),
    sala: document.getElementById("sala").value.trim()
  };
}

/* =========================
   FIRESTORE SAVE (ONLINE)
========================= */
async function saveOnline(status){

  return await addDoc(collection(db,"posts"),{

    ...getData(),

    status,
    role: "writer",
    createdBy: auth.currentUser.uid,

    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp()
  });
}

/* =========================
   SAVE DRAFT (OFFLINE FIRST)
========================= */
document.getElementById("saveDraftBtn").onclick = async () => {

  const statusBox = document.getElementById("statusBox");
  statusBox.innerText = "Saving offline...";

  await saveOffline(getData());

  statusBox.innerText = "Saved offline ✔";
};

/* =========================
   SUBMIT (ONLINE ONLY)
========================= */
document.getElementById("submitBtn").onclick = async () => {

  const statusBox = document.getElementById("statusBox");

  try {

    statusBox.innerText = "Submitting...";

    await saveOnline("submitted");

    statusBox.innerText = "Sent to editor ✔";

  } catch (err) {

    statusBox.innerText = "Offline - saved locally";

    await saveOffline({
      ...getData(),
      status: "submitted"
    });
  }
};

</script>

</body>
</html>
