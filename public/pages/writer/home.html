<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writer Dashboard</title>

<link rel="stylesheet" href="/app/assets/css/global.css">

<style>
body{ margin:0; font-family:Arial; background:#f4f6f8; }

.topbar{
  background:#2e7d32;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{ padding:15px; }

.draft{
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
}

button{
  width:100%;
  margin-top:6px;
  padding:8px;
}
</style>
</head>

<body>

<div class="topbar">✍️ Writer Dashboard</div>

<div class="container">

<button onclick="create()">+ New Draft</button>
<div id="drafts">Loading...</div>

</div>

<div id="globalBottomNav"></div>

<script type="module">

import { protectPage } from "../../app/core/roleGuard.js";
import { db, auth } from "../../app/core/firebase.js";
import { go } from "../../app/core/router.js";

import {
  collection,
  addDoc,
  getDocs,
  query,
  where,
  updateDoc,
  doc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

await protectPage(["writer"]);

/* ================= LOAD DRAFTS ================= */
async function load(){

  const q = query(
    collection(db,"posts"),
    where("status","==","draft")
  );

  const snap = await getDocs(q);

  let html = "";

  snap.forEach(d=>{
    const p = d.data();

    html += `
      <div class="draft">
        <h3>${p.title}</h3>
        <button onclick="edit('${d.id}')">Edit</button>
        <button onclick="submit('${d.id}')">Submit</button>
      </div>
    `;
  });

  document.getElementById("drafts").innerHTML = html;
}

/* ================= CREATE DRAFT ================= */
window.create = async function(){

  await addDoc(collection(db,"posts"),{
    title:"New Draft",
    status:"draft",
    createdBy: auth.currentUser.uid,
    createdAt: serverTimestamp()
  });

  load();
};

/* ================= EDIT ================= */
window.edit = function(id){
  go("writer/edit.html?id=" + id);
};

/* ================= FIXED FLOW =================
   draft → pending_review (NOT "review")
================================================ */
window.submit = async function(id){
  await updateDoc(doc(db,"posts",id),{
    status:"pending_review"
  });

  load();
};

load();

</script>

</body>
</html>
