<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:360px;
  background:#fff;
  padding:24px;
  border-radius:14px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

h3{ text-align:center; color:#2e7d32; }

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  width:100%;
  margin-top:14px;
  padding:12px;
  background:#2e7d32;
  color:#fff;
  border:none;
  border-radius:8px;
}

#msg{
  text-align:center;
  margin-top:10px;
  min-height:18px;
  font-size:13px;
}

.row{
  margin-top:14px;
  font-size:13px;
  text-align:center;
}

.row a{
  color:#2e7d32;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

  <h3>📝 Register</h3>

  <input id="name" placeholder="Jina Kamili" type="text">
  <input id="email" placeholder="Email" type="email">
  <input id="password" placeholder="Password" type="password">

  <button id="registerBtn">Register</button>

  <p id="msg"></p>

  <div class="row">
    <a onclick="go('login.html')">🔐 Already have account? Login</a>
  </div>

</div>

<script type="module">

import { auth } from "../../app/core/firebase.js";
import { go } from "../../app/core/router.js";

import {
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

import {
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

window.go = go;

const msg = document.getElementById("msg");
const btn = document.getElementById("registerBtn");

function setLoading(state){
  btn.disabled = state;
  btn.innerText = state ? "Creating..." : "Register";
}

btn.addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  msg.innerText = "";

  if (!name || !email || !password) {
    msg.innerText = "⚠️ Jaza taarifa zote";
    return;
  }

  try {

    setLoading(true);

    const cred = await createUserWithEmailAndPassword(auth, email, password);

    msg.innerText = "✔ Account created";

    go("login.html");

  } catch (e) {
    msg.innerText = "❌ " + e.message;
    console.log(e);
  } finally {
    setLoading(false);
  }

});

</script>

</body>
</html>
