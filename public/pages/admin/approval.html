<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Approval Panel</title>

<link rel="stylesheet" href="/app/assets/css/global.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.topbar{
  background:#1b5e20;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
  max-width:1100px;
  margin:auto;
}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}

.tab{
  flex:1;
  padding:10px;
  text-align:center;
  background:#e0e0e0;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.tab.active{
  background:#2e7d32;
  color:#fff;
}

.post{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}

.title{
  font-weight:bold;
  margin-bottom:5px;
}

.small{
  font-size:12px;
  color:#777;
  margin-bottom:10px;
}

textarea{
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:8px;
  margin-top:6px;
}

.btns{
  display:flex;
  gap:8px;
  margin-top:10px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.approve{background:#1565c0;color:#fff;}
.publish{background:#2e7d32;color:#fff;}
.schedule{background:#6a1b9a;color:#fff;}
.delete{background:#c62828;color:#fff;}
</style>
</head>

<body>

<div class="topbar">🛡️ Admin Approval Panel</div>

<div class="container">

  <div class="tabs">
    <div class="tab active" onclick="loadPosts('submitted')">Submitted</div>
    <div class="tab" onclick="loadPosts('approved')">Approved</div>
    <div class="tab" onclick="loadPosts('scheduled')">Scheduled</div>
    <div class="tab" onclick="loadPosts('published')">Published</div>
  </div>

  <div id="postsContainer">Loading...</div>

</div>

<script type="module">

import { protectPage } from "../../app/core/authGuard.js";
import { db } from "../../app/core/firebase.js";

import {
  collection,
  query,
  where,
  getDocs,
  doc,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* =========================
   ACCESS CONTROL
========================= */
await protectPage(["admin"]);

let currentTab = "submitted";

/* =========================
   LOAD POSTS
========================= */
window.loadPosts = async (status) => {

  currentTab = status;

  const q = query(collection(db,"posts"), where("status","==",status));
  const snap = await getDocs(q);

  const container = document.getElementById("postsContainer");
  container.innerHTML = "";

  if (snap.empty) {
    container.innerHTML = "No posts found.";
    return;
  }

  snap.forEach(d => {

    const p = d.data();
    const id = d.id;

    container.innerHTML += `
      <div class="post">

        <div class="title">${p.title}</div>

        <div class="small">
          By: ${p.createdBy || "unknown"} | Status: ${p.status}
        </div>

        ${p.publishAt ? `
          <div class="small">
            ⏰ Scheduled: ${new Date(p.publishAt.seconds ? p.publishAt.seconds*1000 : p.publishAt).toLocaleString()}
          </div>
        ` : ""}

        <b>Content</b>
        <textarea id="content-${id}">${p.content || ""}</textarea>

        <b>Tafakari</b>
        <textarea id="tafakari-${id}">${p.tafakari || ""}</textarea>

        <b>Sala</b>
        <textarea id="sala-${id}">${p.sala || ""}</textarea>

        <div class="btns">

          <button class="approve" onclick="approve('${id}')">Approve</button>
          <button class="publish" onclick="publish('${id}')">Publish</button>
          <button class="schedule" onclick="schedule('${id}')">Schedule</button>
          <button class="delete" onclick="remove('${id}')">Delete</button>

        </div>

      </div>
    `;
  });
};

/* =========================
   ACTIONS
========================= */

window.approve = async (id) => {

  await updateDoc(doc(db,"posts",id),{
    status:"approved",
    updatedAt:serverTimestamp()
  });

  loadPosts(currentTab);
};

window.publish = async (id) => {

  await updateDoc(doc(db,"posts",id),{
    status:"published",
    publishedAt:serverTimestamp()
  });

  loadPosts(currentTab);
};

window.schedule = async (id) => {

  const time = prompt("Enter publish date (YYYY-MM-DD HH:MM)");

  if(!time) return;

  const date = new Date(time);

  await updateDoc(doc(db,"posts",id),{
    status:"scheduled",
    publishAt:date,
    updatedAt:serverTimestamp()
  });

  loadPosts(currentTab);
};

window.remove = async (id) => {

  const ok = confirm("Delete post?");
  if(!ok) return;

  await deleteDoc(doc(db,"posts",id));

  loadPosts(currentTab);
};

/* INIT */
loadPosts("submitted");

</script>

</body>
</html>
