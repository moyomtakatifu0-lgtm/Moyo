<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}

/* HEADER */
.header{
  background:#1b5e20;
  color:white;
  padding:15px;
  font-weight:bold;
  text-align:center;
}

/* GRID */
.container{
  padding:15px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap:12px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.2s;
  text-align:center;
}

.card:hover{
  transform:scale(1.03);
}

.icon{
  font-size:26px;
  margin-bottom:8px;
}

.title{
  font-weight:bold;
  color:#2e7d32;
}

.desc{
  font-size:12px;
  color:#666;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
👑 Admin Dashboard
</div>

<div class="container">

  <div class="card" onclick="goPage('admin/posts.html')">
    <div class="icon">📝</div>
    <div class="title">Posts</div>
    <div class="desc">Approve, edit & publish</div>
  </div>

  <div class="card" onclick="goPage('admin/users.html')">
    <div class="icon">👥</div>
    <div class="title">Users</div>
    <div class="desc">Manage roles</div>
  </div>

  <div class="card" onclick="goPage('admin/create-post.html')">
    <div class="icon">➕</div>
    <div class="title">Create Post</div>
    <div class="desc">Write new devotion</div>
  </div>

  <div class="card" onclick="goPage('admin/notifications.html')">
    <div class="icon">🔔</div>
    <div class="title">Notifications</div>
    <div class="desc">System alerts</div>
  </div>

  <div class="card" onclick="goPage('admin/analytics.html')">
    <div class="icon">📊</div>
    <div class="title">Analytics</div>
    <div class="desc">App insights</div>
  </div>

  <div class="card" onclick="goPage('admin/settings.html')">
    <div class="icon">⚙️</div>
    <div class="title">Settings</div>
    <div class="desc">App configuration</div>
  </div>

</div>

<script type="module">
import { go } from "../../app/core/router.js";
import { protectPage } from "../../app/core/roleGuard.js";

window.go = go;

/* admin only */
protectPage(["admin"]);

/* SAFE NAV WRAPPER */
window.goPage = (path) => {
  try {
    go(path);
  } catch (e) {
    console.error("Router error:", e);
  }
};
</script>

</body>
</html>
