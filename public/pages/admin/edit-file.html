<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Post</title>

<link rel="stylesheet" href="../../assets/css/global.css">

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}

.header{
  background:#1b5e20;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
}

select, input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  background:#1565c0;
  color:white;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.msg{
  margin-top:10px;
  text-align:center;
  font-weight:bold;
}

.card{
  background:white;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,.05);
}

</style>
</head>

<body>

<div class="header">
  ✏️ Edit Posts
</div>

<div class="container">

  <div id="postsList">Loading...</div>

  <hr>

  <input id="title" placeholder="Title">
  <textarea id="content" rows="6" placeholder="Content"></textarea>

  <select id="type">
    <option value="devotion">Devotion</option>
    <option value="announcement">Announcement</option>
    <option value="teaching">Teaching</option>
    <option value="news">News</option>
  </select>

  <button onclick="updatePost()">Update Post</button>

  <div class="msg" id="msg"></div>

</div>

<script type="module>

/* ================= CORE ================= */
import { protectPage } from "../../app/core/roleGuard.js";
import { go } from "../../app/core/router.js";
import { auth, db } from "../../app/core/firebase.js";

import {
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* ================= ROUTER ================= */
window.go = go;

/* ================= SECURITY ================= */
await protectPage(["writer","editor","admin"]);

/* ================= STATE ================= */
let currentPostId = null;

/* ================= LOAD POSTS ================= */
async function loadPosts(){

  const snap = await getDocs(collection(db,"posts"));
  const container = document.getElementById("postsList");

  container.innerHTML = "";

  snap.forEach((item)=>{

    const data = item.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${data.title || "No Title"}</b><br>
      <small>${data.type || ""}</small>
    `;

    div.onclick = () => loadPost(item.id);

    container.appendChild(div);
  });
}

/* ================= LOAD SINGLE POST ================= */
async function loadPost(id){

  const snap = await getDoc(doc(db,"posts",id));

  if(!snap.exists()) return;

  const data = snap.data();

  currentPostId = id;

  document.getElementById("title").value = data.title || "";
  document.getElementById("content").value = data.content || "";
  document.getElementById("type").value = data.type || "devotion";
}

/* ================= UPDATE POST ================= */
window.updatePost = async function(){

  const msg = document.getElementById("msg");

  if(!currentPostId){
    msg.innerText = "Select a post first";
    msg.style.color = "red";
    return;
  }

  try {

    await updateDoc(doc(db,"posts",currentPostId), {
      title: document.getElementById("title").value.trim(),
      content: document.getElementById("content").value.trim(),
      type: document.getElementById("type").value,
      updatedAt: Date.now()
    });

    msg.innerText = "Post updated successfully ✔";
    msg.style.color = "green";

    loadPosts();

  } catch (err) {
    console.error(err);
    msg.innerText = "Error updating post ❌";
    msg.style.color = "red";
  }
};

/* ================= INIT ================= */
loadPosts();

</script>

</body>
</html>
