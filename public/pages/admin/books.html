<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Books</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.header{
  background:#2e7d32;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:15px;
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,.05);
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:5px;
}

.primary{background:#2e7d32;color:white;width:100%;}
.danger{background:#c62828;color:white;width:100%;}
.secondary{background:#777;color:white;width:100%;}

.book{
  padding:10px;
  border-bottom:1px solid #eee;
}

small{color:#666}
</style>
</head>

<body>

<div class="header">📚 Admin Book Manager</div>

<div class="container">

  <div class="card">
    <h3>Create / Edit Book</h3>

    <input id="bookId" placeholder="Book ID (bible, rules...)">
    <input id="title" placeholder="Title">
    <textarea id="description" placeholder="Description"></textarea>

    <button class="primary" id="saveBtn">💾 Save Book</button>
  </div>

  <div class="card">
    <h3>Add Chapter</h3>

    <input id="chBookId" placeholder="Book ID">
    <input id="chTitle" placeholder="Chapter Title">
    <textarea id="chContent" placeholder="Chapter Content"></textarea>

    <button class="primary" id="addBtn">➕ Add Chapter</button>
  </div>

  <div class="card">
    <h3>📖 Books</h3>
    <div id="list">Loading...</div>
  </div>

</div>

<script type="module">

import { auth } from "../../app/core/firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

import { protectPage } from "../../app/core/roleGuard.js";
import {
  saveBook,
  addChapter,
  getBooks,
  deleteBook
} from "../../app/core/bookEngine.js";

/* 🔐 STRICT ACCESS */
await protectPage(["admin","editor"]);

/* AUTH SAFETY LAYER */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    location.href = "../login.html";
  }
});

/* STATE */
const listEl = document.getElementById("list");

/* LOAD BOOKS */
async function load(){

  listEl.innerHTML = "Loading...";

  try {
    const books = await getBooks();

    if (!books.length) {
      listEl.innerHTML = "No books found";
      return;
    }

    listEl.innerHTML = "";

    books.forEach(b => {

      const div = document.createElement("div");
      div.className = "book";

      const safeTitle = b.title || "";
      const safeDesc = b.description || "";

      div.innerHTML = `
        <b>${safeTitle}</b><br>
        <small>ID: ${b.id}</small><br>
        <small>Chapters: ${b.chapters?.length || 0}</small><br><br>
      `;

      const editBtn = document.createElement("button");
      editBtn.className = "secondary";
      editBtn.innerText = "Edit";
      editBtn.onclick = () => edit(b.id, safeTitle, safeDesc);

      const delBtn = document.createElement("button");
      delBtn.className = "danger";
      delBtn.innerText = "Delete";
      delBtn.onclick = async () => {
        if (confirm("Delete book?")) {
          await deleteBook(b.id);
          load();
        }
      };

      div.appendChild(editBtn);
      div.appendChild(delBtn);

      listEl.appendChild(div);
    });

  } catch (e) {
    listEl.innerHTML = "Error loading books";
    console.error(e);
  }
}

/* SAVE */
document.getElementById("saveBtn").onclick = async () => {
  await saveBook(
    document.getElementById("bookId").value,
    {
      title: document.getElementById("title").value,
      description: document.getElementById("description").value
    }
  );

  load();
};

/* ADD CHAPTER */
document.getElementById("addBtn").onclick = async () => {
  await addChapter(
    document.getElementById("chBookId").value,
    {
      title: document.getElementById("chTitle").value,
      content: document.getElementById("chContent").value
    }
  );

  load();
};

/* EDIT */
window.edit = (id, title, desc) => {
  document.getElementById("bookId").value = id;
  document.getElementById("title").value = title;
  document.getElementById("description").value = desc;
};

load();

</script>

</body>
</html>
