<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Moyo App - Admin Menu</title>

<link rel="stylesheet" href="/app/assets/css/global.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

/* HEADER */
.header{
  background:#1b5e20;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* GRID */
.container{
  padding:15px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap:12px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  text-align:center;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.icon{
  font-size:26px;
  margin-bottom:8px;
}

.title{
  font-weight:bold;
  color:#2e7d32;
}

.desc{
  font-size:12px;
  color:#666;
  margin-top:5px;
}
</style>

</head>

<body>

<div class="header">
👑 Admin Dashboard
</div>

<div class="container">

  <div class="card" onclick="go('admin/posts.html')">
    <div class="icon">📝</div>
    <div class="title">Posts</div>
    <div class="desc">Approve & manage posts</div>
  </div>

  <div class="card" onclick="go('admin/create-post.html')">
    <div class="icon">➕</div>
    <div class="title">Create Post</div>
    <div class="desc">Write devotion / teaching</div>
  </div>

  <div class="card" onclick="go('admin/approval.html')">
    <div class="icon">✅</div>
    <div class="title">Approval</div>
    <div class="desc">Review pending posts</div>
  </div>

  <div class="card" onclick="go('admin/edit-post.html')">
    <div class="icon">✏️</div>
    <div class="title">Edit Posts</div>
    <div class="desc">Modify existing posts</div>
  </div>

  <div class="card" onclick="go('admin/users.html')">
    <div class="icon">👥</div>
    <div class="title">Users</div>
    <div class="desc">Manage roles</div>
  </div>

  <div class="card" onclick="go('admin/books.html')">
    <div class="icon">📚</div>
    <div class="title">Books</div>
    <div class="desc">Manage devotion books</div>
  </div>

  <div class="card" onclick="go('admin/settings.html')">
    <div class="icon">⚙️</div>
    <div class="title">Settings</div>
    <div class="desc">App configuration</div>
  </div>

</div>

<script type="module">
import { go } from "../../app/core/router.js";
import { protectPage } from "../../app/core/roleGuard.js";

window.go = go;

/* 🔐 ADMIN ONLY */
protectPage(["admin"]);
</script>

</body>
</html>
