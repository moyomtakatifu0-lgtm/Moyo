<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Management</title>

<link rel="stylesheet" href="../assets/css/global.css">

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
  padding-bottom:80px;
}

.container{
  max-width:700px;
  margin:auto;
}

h2{
  color:#2e7d32;
  text-align:center;
}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#2e7d32;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
}

.loading{
  color:gray;
  text-align:center;
}

small{
  color:#666;
}
</style>
</head>

<body>

<div class="container">

  <h2>👑 Users</h2>

  <div id="users" class="loading">Loading users...</div>

</div>

<div id="globalBottomNav"></div>

<script type="module">

import { db } from "../app/core/firebase.js";
import { protectPage } from "../app/core/accessEngine.js";
import { loadBottomNav } from "../app/components/bottomNav.js";
import { go } from "../app/core/router.js";

import {
  collection,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* ACCESS */
await protectPage(["admin"]);

window.go = go;

const usersDiv = document.getElementById("users");

async function loadUsers(){

  try{

    const snap = await getDocs(collection(db,"users"));

    usersDiv.innerHTML = "";

    if(snap.empty){
      usersDiv.innerHTML = "<div class='loading'>No users found</div>";
      return;
    }

    snap.forEach(u => {

      const d = u.data();

      const card = document.createElement("div");
      card.className = "card";

      const left = document.createElement("div");
      left.innerHTML = `
        <b>${d.fullName || "No name"}</b><br>
        <small>${d.role || "user"}</small>
      `;

      const btn = document.createElement("button");

      if(d.role === "editor"){
        btn.textContent = "Already Editor";
        btn.disabled = true;
      } else {
        btn.textContent = "Make Editor";
      }

      btn.onclick = async () => {

        const ok = confirm("Make this user an editor?");
        if(!ok) return;

        btn.disabled = true;
        btn.textContent = "Updating...";

        try{
          await updateDoc(doc(db,"users",u.id), {
            role: "editor"
          });

          loadUsers();

        } catch(err){
          alert(err.message);
          btn.disabled = false;
          btn.textContent = "Make Editor";
        }

      };

      card.appendChild(left);
      card.appendChild(btn);

      usersDiv.appendChild(card);

    });

  } catch(e){
    usersDiv.innerHTML = `<div class='loading'>${e.message}</div>`;
  }

}

loadUsers();

/* NAVIGATION FIX */
document.getElementById("globalBottomNav").innerHTML =
  loadBottomNav("admin");

</script>

</body>
</html>
