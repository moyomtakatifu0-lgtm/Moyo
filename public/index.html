<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moyo App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f4f6f8;
}
</style>
</head>

<body>

<h3>🔄 Loading Moyo App...</h3>

<script type="module">

import { auth } from "./app/core/firebase.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

/* SAFETY FLAG */
let resolved = false;

/* HARD TIMEOUT (PREVENT FREEZE) */
setTimeout(() => {
  if (!resolved) {
    console.log("Timeout reached - redirecting to login");
    window.location.href = "./pages/login.html";
  }
}, 5000);

/* AUTH LISTENER */
try {

  onAuthStateChanged(auth, (user) => {

    resolved = true;

    if (user) {
      window.location.href = "./pages/devotion/home.html";
    } else {
      window.location.href = "./pages/login.html";
    }

  });

} catch (error) {

  console.log("Auth error:", error);
  window.location.href = "./pages/login.html";

}

</script>

</body>
</html>
